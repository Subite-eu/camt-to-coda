name: security-scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm audit --audit-level=moderate
