name: build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run build & tests
        shell: bash
        run: |
          cd ./java/BankFileConverter
          sh ./build.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: java/BankFileConverter/CamtToCoda/target/surefire-reports/

  quality:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'corretto'

      - name: SpotBugs analysis
        shell: bash
        run: |
          cd java/BankFileConverter
          mvn compile com.github.spotbugs:spotbugs-maven-plugin:4.8.6.4:check -pl CamtToCoda || true

      - name: OWASP Dependency Check
        shell: bash
        run: |
          cd java/BankFileConverter
          mvn org.owasp:dependency-check-maven:10.0.4:check || true

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run build script
        shell: bash
        run: |
          cd ./java/BankFileConverter
          sh ./build.sh

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: echo "name=${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: ./java/BankFileConverter/docker/run/Dockerfile
          context: ./java/BankFileConverter
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
