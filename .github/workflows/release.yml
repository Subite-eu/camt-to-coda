name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'corretto'

      - name: Build with Maven
        shell: bash
        run: |
          cd java/BankFileConverter
          mvn clean package -DskipTests

      - name: Prepare release artifact
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cd java/BankFileConverter/CamtToCoda/target
          ls -la *.zip
          cp CamtToCoda-1.0.0.zip "camt2coda-${TAG}.zip"

      # Docker image tagged with version
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: echo "name=${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push versioned Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: ./java/BankFileConverter/docker/run/Dockerfile
          context: ./java/BankFileConverter
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            **Docker** (easiest):
            ```bash
            docker pull ghcr.io/${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ```

            **Download & run** (requires JDK 23):
            1. Download `camt2coda-${{ github.ref_name }}.zip` below
            2. Unzip: `unzip camt2coda-${{ github.ref_name }}.zip`
            3. Run: `sh CamtToCoda.sh -v 53 -i input/ -o output/`

            **From source**:
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd camt-to-coda/java/BankFileConverter
            mvn clean package
            ```
          files: java/BankFileConverter/CamtToCoda/target/camt2coda-*.zip
