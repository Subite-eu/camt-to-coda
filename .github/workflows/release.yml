name: Release

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        shell: bash
        env: { REPO: '${{ github.repository }}' }
        run: echo "name=${REPO,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          push: true
          file: Dockerfile
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ghcr.io/${{ steps.image.outputs.name }}:latest
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            **Docker:**
            ```bash
            docker pull ghcr.io/${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ```

            **npm:**
            ```bash
            npx camt2coda convert -i input/ -o output/
            ```
