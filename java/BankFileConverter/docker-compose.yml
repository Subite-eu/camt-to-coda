services:
   s3:
      image: quay.io/minio/minio:latest
      command: server /data --console-address ":9001"
      volumes:
        - minio-data:/data
      ports:
        - '9000:9000'
        - '9001:9001'
      environment:
        - MINIO_ROOT_USER=s3_username
        - MINIO_ROOT_PASSWORD=s3_password
      healthcheck:
        test: ["CMD", "mc", "ready", "local"]
        interval: 5s
        timeout: 5s
        retries: 5
   s3-init:
      image: quay.io/minio/mc:latest
      depends_on:
        s3:
          condition: service_healthy
      entrypoint: >
        /bin/sh -c "
        mc alias set local http://s3:9000 s3_username s3_password;
        mc mb --ignore-existing local/camt;
        mc mb --ignore-existing local/coda;
        mc mb --ignore-existing local/archive;
        mc mb --ignore-existing local/error;
        exit 0;
        "
   java-build:
      build:
         dockerfile: docker/build/Dockerfile
      depends_on:
        s3-init:
          condition: service_completed_successfully
      environment:
         - INSIDE-BUILD-CI=true
      volumes:
         - ../..:/src
   java-run:
      build:
         dockerfile: docker/run/Dockerfile
      environment:
         - MODE=${MODE:-FS}
         - VERSION=${VERSION:-53}
         - IN=${IN:-/in}
         - OUT=${OUT:-/out}
         - ARCHIVE=${ARCHIVE:-/archive}
         - ERROR=${ERROR:-/error}
         - EP=${EP:-NA}
         - AK=${AK:-NA}
         - SK=${SK:-NA}
      volumes:
         - ./test_data/fs/in:/in
         - ./test_data/fs/out:/out
         - ./test_data/fs/archive:/archive
         - ./test_data/fs/error:/error

volumes:
  minio-data:
