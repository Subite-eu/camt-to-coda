services:
   s3:
      image: docker.io/bitnami/minio:2024
      volumes:
        - ./test_data/s3:/bitnami/minio/data:rw
      ports:
        - '9000:9000'
        - '9001:9001'
      environment:
        - MINIO_ROOT_USER=s3_username
        - MINIO_ROOT_PASSWORD=s3_password
        - MINIO_DEFAULT_BUCKETS=camt:coda:archive:error
      user: 0:0
   java-build:
      build:
         dockerfile: docker/build/Dockerfile
      environment:
         - INSIDE-BUILD-CI=true
      volumes:
         - ../..:/src
   java-run:
      build:
         dockerfile: docker/run/Dockerfile
      environment:
         - MODE=${MODE:-FS}
         - VERSION=${VERSION:-53}
         - IN=${IN:-/in}
         - OUT=${OUT:-/out}
         - ARCHIVE=${ARCHIVE:-/archive}
         - ERROR=${ERROR:-53}
         - ERROR=${ERROR:-/error}
         - EP=${EP:-NA}
         - AK=${AK:-NA}
         - SK=${SK:-NA}
      volumes:
         - ./test_data/fs/in:/in
         - ./test_data/fs/out:/out
         - ./test_data/fs/archive:/archive
         - ./test_data/fs/error:/error
