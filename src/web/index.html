<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>camt2coda -- CAMT to CODA Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1b1e;
      --surface: #25262b;
      --surface2: #2c2e33;
      --border: #373a40;
      --accent: #228be6;
      --accent-hover: #1c7ed6;
      --green: #40c057;
      --red: #fa5252;
      --yellow: #fab005;
      --text: #c1c2c5;
      --text-dim: #868e96;
      --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    header .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    main {
      flex: 1;
      padding: 24px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface);
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .drop-zone svg {
      width: 40px;
      height: 40px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .drop-zone h2 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .drop-zone p {
      color: var(--text-dim);
      font-size: 13px;
    }

    #file-input { display: none; }

    /* Options bar */
    .options-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
    }

    /* Status */
    #status {
      display: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    #status.loading { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
    #status.success { background: #1a3a1a; border: 1px solid var(--green); color: var(--green); }
    #status.error   { background: #3a1a1a; border: 1px solid var(--red);   color: var(--red); }

    /* Result panels */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .result-header .file-name {
      font-family: var(--mono);
      font-size: 13px;
      color: #fff;
      font-weight: 600;
    }

    .result-header .meta {
      color: var(--text-dim);
      font-size: 12px;
    }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 6px 14px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.1s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    /* Validation badges */
    .validation-badges {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .badge-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-ok     { background: #1a3a1a; color: var(--green); }
    .badge-error  { background: #3a1a1a; color: var(--red); }
    .badge-warn   { background: #3a2e1a; color: var(--yellow); }

    .errors-list {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .errors-list .error-item {
      color: var(--red);
      font-size: 12px;
      padding: 2px 0;
    }

    .errors-list .warn-item {
      color: var(--yellow);
      font-size: 12px;
      padding: 2px 0;
    }

    /* CODA preview */
    .coda-preview {
      position: relative;
    }

    .coda-preview pre {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      padding: 16px;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre;
      color: #c9d1d9;
    }

    .rec-0  { color: #79c0ff; }
    .rec-1  { color: #7ee787; }
    .rec-2  { color: #ffa657; }
    .rec-3  { color: #d2a8ff; }
    .rec-8  { color: #f47067; }
    .rec-9  { color: #79c0ff; }

    .version-label {
      color: var(--text-dim);
      font-size: 13px;
      font-style: italic;
    }
  </style>
</head>
<body>

<header>
  <h1>camt2coda</h1>
  <span class="badge">v2.0</span>
  <span class="version-label" id="detected-version"></span>
</header>

<main>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
    </svg>
    <h2>Drop a CAMT XML file here, or click to browse</h2>
    <p>Supports CAMT.052 and CAMT.053 (all versions)</p>
    <input type="file" id="file-input" accept=".xml,application/xml,text/xml" />
  </div>

  <!-- Options -->
  <div class="options-bar">
    <label class="checkbox-label">
      <input type="checkbox" id="anonymize-check" />
      Anonymize sensitive data (IBANs, BICs, names)
    </label>
  </div>

  <!-- Status -->
  <div id="status"></div>

  <!-- Results -->
  <div id="results"></div>

</main>

<script>
(function () {
  'use strict';

  var dropZone = document.getElementById('drop-zone');
  var fileInput = document.getElementById('file-input');
  var statusEl = document.getElementById('status');
  var resultsEl = document.getElementById('results');
  var versionLabel = document.getElementById('detected-version');
  var anonymizeCheck = document.getElementById('anonymize-check');

  // Click to browse
  dropZone.addEventListener('click', function () { fileInput.click(); });
  fileInput.addEventListener('change', function () {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  // Drag and drop
  dropZone.addEventListener('dragover', function (e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', function () {
    dropZone.classList.remove('drag-over');
  });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    var file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = cls;
    statusEl.style.display = 'block';
  }

  function clearResults() {
    while (resultsEl.firstChild) {
      resultsEl.removeChild(resultsEl.firstChild);
    }
  }

  function handleFile(file) {
    clearResults();
    versionLabel.textContent = '';
    setStatus('Converting...', 'loading');

    var form = new FormData();
    form.append('file', file, file.name);
    form.append('anonymize', anonymizeCheck.checked ? 'true' : 'false');

    fetch('/api/convert', { method: 'POST', body: form })
      .then(function (resp) {
        return resp.json().then(function (data) {
          return { ok: resp.ok, status: resp.status, data: data };
        });
      })
      .then(function (result) {
        if (!result.ok) {
          setStatus('Error: ' + (result.data.error || result.status), 'error');
          return;
        }

        var data = result.data;
        if (data.version) {
          versionLabel.textContent = data.version;
        }

        var allValid = data.files.every(function (f) { return f.validation.valid; });
        setStatus(
          allValid
            ? 'Converted ' + data.files.length + ' statement(s) successfully'
            : 'Converted with validation issues',
          allValid ? 'success' : 'error'
        );

        clearResults();
        for (var i = 0; i < data.files.length; i++) {
          resultsEl.appendChild(buildResultCard(data.files[i]));
        }
      })
      .catch(function (err) {
        setStatus('Request failed: ' + err.message, 'error');
      });
  }

  function el(tag, cls) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  function buildResultCard(fileData) {
    var card = el('div', 'result-card');

    // Header
    var header = el('div', 'result-header');

    var nameEl = el('span', 'file-name');
    nameEl.textContent = fileData.fileName;

    var metaEl = el('span', 'meta');
    metaEl.textContent = fileData.recordCount + ' records \u00b7 ' + fileData.lines.length + ' lines';

    var actions = el('div', 'result-actions');

    var copyBtn = el('button', 'btn btn-secondary');
    copyBtn.textContent = 'Copy';
    copyBtn.addEventListener('click', function () {
      navigator.clipboard.writeText(fileData.lines.join('\n') + '\n')
        .then(function () {
          copyBtn.textContent = 'Copied!';
          setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1500);
        });
    });

    var dlBtn = el('button', 'btn btn-primary');
    dlBtn.textContent = 'Download .cod';
    dlBtn.addEventListener('click', function () {
      var blob = new Blob([fileData.lines.join('\n') + '\n'], { type: 'text/plain' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fileData.fileName;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    actions.appendChild(copyBtn);
    actions.appendChild(dlBtn);
    header.appendChild(nameEl);
    header.appendChild(metaEl);
    header.appendChild(actions);

    // Validation badges
    var badges = el('div', 'validation-badges');

    var validBadge = el('span', 'badge-item ' + (fileData.validation.valid ? 'badge-ok' : 'badge-error'));
    validBadge.textContent = fileData.validation.valid ? 'Valid CODA' : 'Validation failed';
    badges.appendChild(validBadge);

    if (fileData.validation.warnings.length > 0) {
      var warnBadge = el('span', 'badge-item badge-warn');
      warnBadge.textContent = fileData.validation.warnings.length + ' warning(s)';
      badges.appendChild(warnBadge);
    }

    card.appendChild(header);
    card.appendChild(badges);

    // Errors / warnings list
    var hasIssues = fileData.validation.errors.length > 0 || fileData.validation.warnings.length > 0;
    if (hasIssues) {
      var errList = el('div', 'errors-list');
      for (var i = 0; i < fileData.validation.errors.length; i++) {
        var item = el('div', 'error-item');
        item.textContent = fileData.validation.errors[i];
        errList.appendChild(item);
      }
      for (var j = 0; j < fileData.validation.warnings.length; j++) {
        var witem = el('div', 'warn-item');
        witem.textContent = fileData.validation.warnings[j];
        errList.appendChild(witem);
      }
      card.appendChild(errList);
    }

    // CODA preview
    var preview = el('div', 'coda-preview');
    var pre = el('pre');
    var classMap = {'0':'rec-0','1':'rec-1','2':'rec-2','3':'rec-3','8':'rec-8','9':'rec-9'};
    for (var k = 0; k < fileData.lines.length; k++) {
      var line = fileData.lines[k];
      var span = el('span', classMap[line[0]] || '');
      span.textContent = line + '\n';
      pre.appendChild(span);
    }
    preview.appendChild(pre);
    card.appendChild(preview);

    return card;
  }
}());
</script>
</body>
</html>
